name: Build y Deploy a Firebase Hosting

on:
  push:
    branches:
      - main  # Solo se despliega cuando se hace push/merge a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: illo-un-campero-web/package-lock.json

      - name: Instalar dependencias
        working-directory: illo-un-campero-web
        run: npm ci

      - name: Inyectar variables de entorno en environment.prod.ts
        working-directory: illo-un-campero-web
        run: |
          sed -i "s|SUSTITUIR_CLOUD_NAME|${{ secrets.CLOUDINARY_CLOUD_NAME }}|g" src/environments/environment.prod.ts
          sed -i "s|pk_live_SUSTITUIR_POR_CLAVE_REAL|${{ secrets.STRIPE_PUBLISHABLE_KEY }}|g" src/environments/environment.prod.ts

      - name: Build de producción
        working-directory: illo-un-campero-web
        run: npx ng build --configuration production

      - name: Deploy a Firebase Hosting
        working-directory: illo-un-campero-web
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
