@if (visible()) {
  <div class="cookie-banner" role="region" aria-label="Aviso de cookies">
    <div class="cookie-content">
      <p>
        {{ 'COOKIES.TEXTO' | translate }}
        <a routerLink="/privacidad">{{ 'COOKIES.POLITICA' | translate }}</a>.
      </p>
      <div class="cookie-actions">
        <button class="btn-aceptar" (click)="aceptar()">{{ 'COOKIES.ACEPTAR' | translate }}</button>
      </div>
    </div>
  </div>
}
