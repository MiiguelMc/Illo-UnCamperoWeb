<div class="login-screen">
    <div class="login-box">
        <div class="header-login">
            <img src="assets/Nombre-Arqueado+Logo.webp" alt="Logo" class="logo">
            <h1>{{ 'LOGIN.TITULO' | translate }}</h1>
            <p>{{ 'LOGIN.SUBTITULO' | translate }}</p>
        </div>
        <form (submit)="onLogin()">
            <div class="input-group">
                <label>{{ 'LOGIN.EMAIL' | translate }}</label>
                <input type="email" [(ngModel)]="email" name="email" [class.input-error]="emailError" placeholder="correo@ejemplo.com">
                <span class="error-text" *ngIf="emailError">{{ emailError | translate }}</span>
            </div>
            <div class="input-group">
                <label>{{ 'LOGIN.PASSWORD' | translate }}</label>
                <input type="password" [(ngModel)]="password" name="password" [class.input-error]="passwordError" placeholder="********">
                <span class="error-text" *ngIf="passwordError">{{ passwordError | translate }}</span>
            </div>
            <button type="submit" class="btn-login">{{ 'LOGIN.BTN' | translate }}</button>
            <p class="footer-text">
                {{ 'LOGIN.SIN_CUENTA' | translate }}
                <span class="link" routerLink="/registro">{{ 'LOGIN.REGISTRATE' | translate }}</span>
            </p>
        </form>
    </div>
</div>
