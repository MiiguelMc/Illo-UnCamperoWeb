<nav class="main-header">
  <div class="header-container">
    
    <!-- LOGO CON PIQUETE -->
    <a routerLink="/restaurantes" class="logo-box">
      <img src="assets/LogoFondoTransparente.webp" alt="Illo Logo">
    </a>

    <!-- LINKS CON FLOW -->
    <ul class="nav-menu">
      <li><a routerLink="/restaurantes" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
      <li><a routerLink="/carta" routerLinkActive="active">Carta</a></li>
      <li><a routerLink="/carrito" routerLinkActive="active">Tu pedido</a></li>
    </ul>

    <!-- ACCIONES DEL USUARIO -->
    <div class="actions-box">
      <div class="user-pill" (click)="toggleMenu()">
        <span class="user-icon">👤</span>
        <span class="user-name">{{ (user$ | async)?.nombre }}</span>
        
        <!-- DROPDOWN MEJORADO -->
        @if (isMenuOpen) {
          <div class="dropdown-fancy">
            <a routerLink="/perfil" (click)="isMenuOpen = false">⚙️ Configuración</a>
            <a routerLink="/mis-pedidos" (click)="isMenuOpen = false">📦 Mis Pedidos</a>
            <hr>
            <a class="logout-link" (click)="logout()">🚪 Cerrar sesión</a>
          </div>
        }
      </div>

      <!-- CARRITO PREMIUM -->
      <div class="cart-pill" routerLink="/carrito">
        <div class="cart-icon-box">
           <img src="assets/carro.webp" class="cart-img">
        </div>
        <span class="cart-amount">{{ carritoService.totalPrecio() | number:'1.2-2' }}€</span>
      </div>
    </div>

  </div>
</nav>
