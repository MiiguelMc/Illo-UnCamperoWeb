<nav class="main-nav">
  <div class="container flex-row">

    <a routerLink="/restaurantes" class="logo">
      <img src="assets/LogoFondoTransparente.webp" alt="Illo Logo">
    </a>

    <ul class="nav-links">
      <li routerLink="/restaurantes" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</li>

      <li routerLink="/carta" routerLinkActive="active">Carta</li>

      <li routerLink="/tu-pedido" routerLinkActive="active">Tu pedido</li>
    </ul>

    <div class="auth-container">
      <div class="user-dropdown-wrapper">
        <div class="user-trigger" (click)="toggleMenu()">
          <span class="avatar-icon">👤</span>
          <span class="user-name">{{ (user$ | async)?.nombre }}</span>
        </div>

        @if (isMenuOpen) {
        <div class="dropdown-menu">
          <ul>
            <li routerLink="/perfil" (click)="isMenuOpen = false">Configuración</li>
            
            <!-- Enlace a Mis Pedidos añadido aquí -->
            <li routerLink="/mis-pedidos" (click)="isMenuOpen = false">Mis Pedidos</li>
            
            <li class="logout" (click)="logout(); isMenuOpen = false">Cerrar sesión</li>
          </ul>
        </div>
        }
      </div>

      <div class="cart-pill" routerLink="/carrito">
        <img src="assets/carro.webp" class="img-carrito-fija">
        <i class="fas fa-shopping-cart"></i>
        <!-- Se actualizará automáticamente -->
        {{ carritoService.totalPrecio() | number:'1.2-2' }}€
      </div>
    </div>
  </div>
</nav>
