<div class="carta-page">
    <div class="carta-hero">
        <div class="hero-overlay">
            <h1>Nuestra Carta</h1>
            <p>Aquí se come de verdad, mi loco</p>
        </div>
    </div>

    <!-- BOTONERA PA' FILTRAR DE VERDAD -->
    <nav class="sticky-nav">
        <div class="nav-container">
            <button [class.active]="filtroActual === 'todos'" (click)="setFiltro('todos')">✨ Todos</button>
            <button [class.active]="filtroActual === 'entrantes'" (click)="setFiltro('entrantes')">🥗 Entrantes</button>
            <button [class.active]="filtroActual === 'camperos'" (click)="setFiltro('camperos')">🍔 Camperos</button>
            <button [class.active]="filtroActual === 'postres'" (click)="setFiltro('postres')">🍰 Postres</button>
            <button [class.active]="filtroActual === 'bebidas'" (click)="setFiltro('bebidas')">🥤 Bebidas</button>
        </div>
    </nav>

    <div class="carta-container">
        
        <!-- 1. ENTRANTES -->
        <section class="seccion-menu" *ngIf="(filtroActual === 'todos' || filtroActual === 'entrantes') && getPorCategoria('Entrante').length > 0">
            <h2 class="titulo-categoria">Entrantes</h2>
            <ng-container *ngFor="let sub of subEntrantes">
                <div class="sub-bloque" *ngIf="getPorSubcategoria('Entrante', sub).length > 0">
                    <h3 class="titulo-subcategoria">{{ sub === 'Patata' ? 'Patatas' : sub }}</h3>
                    <div class="productos-grid">
                        <app-producto-item *ngFor="let p of getPorSubcategoria('Entrante', sub)" [producto]="p" (click)="abrirModal(p)"></app-producto-item>
                    </div>
                </div>
            </ng-container>
        </section>

        <!-- 2. CAMPEROS -->
        <section class="seccion-menu" *ngIf="(filtroActual === 'todos' || filtroActual === 'camperos') && getPorCategoria('Campero').length > 0">
            <h2 class="titulo-categoria">Los Camperos</h2>
            <ng-container *ngFor="let sub of subCamperos">
                <div class="sub-bloque" *ngIf="getPorSubcategoria('Campero', sub).length > 0">
                    <h3 class="titulo-subcategoria">{{ sub === 'Mini' ? 'Mini Camperos' : sub }}</h3>
                    <div class="productos-grid">
                        <app-producto-item *ngFor="let p of getPorSubcategoria('Campero', sub)" [producto]="p" (click)="abrirModal(p)"></app-producto-item>
                    </div>
                </div>
            </ng-container>
        </section>

        <!-- 3. POSTRES -->
        <section class="seccion-menu" *ngIf="(filtroActual === 'todos' || filtroActual === 'postres') && getPorCategoria('Postre').length > 0">
            <h2 class="titulo-categoria">Postres</h2>
            <div class="productos-grid">
                <app-producto-item *ngFor="let p of getPorCategoria('Postre')" [producto]="p" (click)="abrirModal(p)"></app-producto-item>
            </div>
        </section>

        <!-- 4. BEBIDAS -->
        <section class="seccion-menu" *ngIf="(filtroActual === 'todos' || filtroActual === 'bebidas') && getPorCategoria('Bebida').length > 0">
            <h2 class="titulo-categoria">Bebidas</h2>
            <div class="productos-grid">
                <app-producto-item *ngFor="let p of getPorCategoria('Bebida')" [producto]="p" (click)="abrirModal(p)"></app-producto-item>
            </div>
        </section>
    </div>

    <!-- EL MODAL SE QUEDA IGUAL, QUE YA ESTÁ DURO -->
    <div class="modal-overlay" *ngIf="productoSeleccionado" (click)="cerrarModal()">
        <!-- ... (tu código del modal que ya tienes) ... -->
    </div>
</div>
