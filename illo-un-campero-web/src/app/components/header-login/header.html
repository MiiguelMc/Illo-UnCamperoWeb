<nav class="main-header">
  <div class="header-container">
    <!-- LOGO CON PIQUETE -->
    <a routerLink="/restaurantes" class="logo-box">
      <img src="assets/LogoFondoTransparente.webp" alt="Illo Logo" />
    </a>

    <!-- LINKS CENTRALES -->
    <ul class="nav-menu">
      <li>
        <a
          routerLink="/restaurantes"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Inicio</a
        >
      </li>
      <li><a routerLink="/carta" routerLinkActive="active">Carta</a></li>
      <!-- Tu pedido llama a la función del pop-up porque no hay sesión -->
      <li>
        <a
          (click)="comprobarPedido()"
          class="nav-link-btn"
          [class.active]="router.url === '/tu-pedido'"
        >
          Tu pedido
        </a>
      </li>
    </ul>

    <!-- BOTONES DE ACCIÓN (Gemelos de la Home) -->
    <div class="actions-box">
      <button class="btn-login-black" routerLink="/login">Iniciar sesión</button>
      <button class="btn-register-white" routerLink="/registro">Registrarse</button>
    </div>
  </div>
</nav>
