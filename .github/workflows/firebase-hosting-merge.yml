# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - develop
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm ci
          sed -i "s|STRIPE_PUBLISHABLE_KEY_PLACEHOLDER|${{ secrets.STRIPE_PUBLISHABLE_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|FIREBASE_API_KEY_PLACEHOLDER|${{ secrets.FIREBASE_API_KEY }}|g" src/environments/environment.prod.ts
          sed -i "s|FIREBASE_APP_ID_PLACEHOLDER|${{ secrets.FIREBASE_APP_ID }}|g" src/environments/environment.prod.ts
          npm run build
        working-directory: illo-un-campero-web

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ILLO_UNCAMPERO }}
          channelId: live
          projectId: illo-uncampero
          entryPoint: illo-un-campero-web
