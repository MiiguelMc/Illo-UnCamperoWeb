name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm ci
          node -e "const fs=require('fs');const p='src/environments/environment.prod.ts';let c=fs.readFileSync(p,'utf8');const r=(k,v)=>{c=c.split(k).join((v||'').trim());};r('STRIPE_PUBLISHABLE_KEY_PLACEHOLDER',process.env.STRIPE_PUBLISHABLE_KEY);r('FIREBASE_API_KEY_PLACEHOLDER',process.env.FIREBASE_API_KEY);r('FIREBASE_APP_ID_PLACEHOLDER',process.env.FIREBASE_APP_ID);fs.writeFileSync(p,c);"
          npm run build
        working-directory: illo-un-campero-web
        env:
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ILLO_UNCAMPERO }}
          channelId: live
          projectId: illo-uncampero
          entryPoint: illo-un-campero-web
        env:
          FIREBASE_JSON: firebase.json
